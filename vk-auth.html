<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вход ВКонтакте — Vacantrix</title>
  <style>
    html, body { height: 100%; }
    body {
      margin: 0; background: #0f0f13; color: #e6e6ec;
      font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 16px; padding: 20px;
    }
    #status { font-size: 15px; color: #cfcfd6; text-align: center; }
    #onetap { width: 320px; min-height: 48px; }
    #err { font-size: 12px; color: #ff6b6b; white-space: pre-wrap;
           max-width: 92%; text-align: center; }
    .hint { font-size: 12px; color: #6a6a74; text-align: center; max-width: 360px; }
  </style>
</head>
<body>
  <div id="status">Войдите в свой ВКонтакте — это нужно один раз:</div>
  <div id="onetap"></div>
  <div class="hint">После входа приложение запомнит сессию — повторно вводить
    ничего не придётся.</div>
  <div id="err"></div>

  <script src="https://unpkg.com/@vkid/sdk@<3.0.0/dist-sdk/umd/index.js"></script>
  <script type="text/javascript">
    (function () {
      function q(n) { return new URLSearchParams(location.search).get(n); }
      var APP = parseInt(q('app') || '54636455', 10);
      var SCOPE = q('scope') || 'wall photos groups offline';
      var REDIRECT = 'https://oauth.vk.com/blank.html';
      var statusEl = document.getElementById('status');
      var errEl = document.getElementById('err');

      function log() { try { console.log.apply(console, ['[vkauth]'].concat([].slice.call(arguments))); } catch (_) {} }
      function showErr(e) {
        var s; try { s = (typeof e === 'string') ? e : JSON.stringify(e); } catch (_) { s = String(e); }
        errEl.textContent = s; log('ERROR', s);
      }
      function done(data) {
        log('exchange result', JSON.stringify(data));
        var t = data && (data.access_token || data.token) || '';
        var uid = data && (data.user_id || data.userId) || '';
        if (!t) { showErr('Нет access_token: ' + JSON.stringify(data)); return; }
        location.href = REDIRECT + '#access_token=' + encodeURIComponent(t) +
                        '&user_id=' + encodeURIComponent(uid);
      }
      function onLogin(payload) {
        log('LOGIN_SUCCESS', JSON.stringify(payload));
        statusEl.textContent = 'Завершаю вход…';
        try { window.VKID.Auth.exchangeCode(payload.code, payload.device_id).then(done).catch(showErr); }
        catch (e) { showErr(e); }
      }

      function init() {
        if (!('VKIDSDK' in window)) { statusEl.textContent = 'VK ID SDK не загрузился'; return; }
        var VKID = window.VKID = window.VKIDSDK;
        VKID.Config.init({
          app: APP, redirectUrl: REDIRECT,
          responseMode: VKID.ConfigResponseMode.Callback,
          source: VKID.ConfigSource.LOWCODE, scope: SCOPE,
        });
        try {
          var oneTap = new VKID.OneTap();
          oneTap.render({
            container: document.getElementById('onetap'),
            showAlternativeLogin: true,
            styles: { width: 320, height: 48, borderRadius: 10 },
          })
          .on(VKID.WidgetEvents.ERROR, showErr)
          .on(VKID.OneTapInternalEvents.LOGIN_SUCCESS, onLogin);
        } catch (e) { showErr(e); }
      }

      if ('VKIDSDK' in window) { init(); }
      else {
        window.addEventListener('load', init);
        setTimeout(function () { if ('VKIDSDK' in window && !window.VKID) init(); }, 1500);
      }
    })();
  </script>
</body>
</html>
