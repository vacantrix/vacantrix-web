<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vacantrix — Панель управления</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }

    /* Sidebar layout */
    .admin-layout {
      display: grid;
      grid-template-columns: 220px 1fr;
      flex: 1; gap: 0;
    }
    @media (max-width: 640px) {
      .admin-layout { grid-template-columns: 1fr; }
      .admin-sidebar { flex-direction: row; overflow-x: auto; }
    }

    .admin-sidebar {
      background: var(--glass);
      backdrop-filter: var(--blur);
      border-right: 1px solid var(--border2);
      display: flex; flex-direction: column;
      padding: 20px 12px; gap: 6px;
      position: sticky; top: 60px;
      height: calc(100vh - 60px);
    }
    .admin-sidebar-title {
      font-size: 11px; text-transform: uppercase;
      letter-spacing: .08em; color: var(--text3);
      padding: 0 12px 8px;
    }

    .admin-nav-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 16px; border-radius: 10px;
      border: none; background: transparent;
      color: var(--text2); font-size: 14px;
      cursor: pointer; transition: all .2s; text-align: left;
    }
    .admin-nav-btn:hover { background: rgba(255,255,255,.06); color: var(--text); }
    .admin-nav-btn.active {
      background: linear-gradient(135deg, var(--accent), var(--accent-d));
      color: #fff;
    }

    .admin-main { padding: 28px; overflow-y: auto; }

    .admin-section-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 20px;
    }
    .admin-section-header h2 { font-size: 22px; font-weight: 700; }

    .admin-list { display: flex; flex-direction: column; gap: 8px; }

    .admin-item {
      display: flex; align-items: center; gap: 12px;
      background: var(--glass); backdrop-filter: var(--blur);
      border: 1px solid var(--border2);
      border-radius: 12px; padding: 12px 16px;
      transition: border-color .2s;
    }
    .admin-item:hover { border-color: var(--border); }
    .admin-item[draggable=true] { cursor: grab; }
    .admin-item[draggable=true]:active { cursor: grabbing; }

    .drag-handle { color: var(--text3); font-size: 18px; cursor: grab; user-select: none; }
    .admin-item-icon { font-size: 20px; }
    .admin-item-info { flex: 1; display: flex; flex-direction: column; gap: 3px; }
    .admin-item-info strong { font-size: 14px; }
    .admin-item-info small { font-size: 12px; color: var(--text2); }

    .admin-item-status {
      font-size: 12px; padding: 3px 10px; border-radius: 20px;
      white-space: nowrap;
    }
    .admin-item-status.active  { background: rgba(30,160,30,.2); color: #60cc60; }
    .admin-item-status.inactive{ background: rgba(160,30,30,.2); color: #cc6060; }

    .admin-item-actions { display: flex; gap: 6px; }
    .admin-item-actions .btn-ghost, .admin-item-actions .btn-danger {
      width: 32px; height: 32px; padding: 0;
      display: flex; align-items: center; justify-content: center;
      border-radius: 8px; font-size: 14px;
    }

    .admin-card {
      background: var(--glass); backdrop-filter: var(--blur);
      border: 1px solid var(--border2);
      border-radius: 16px; padding: 24px;
      max-width: 540px;
    }

    /* Модальное окно */
    #admin-modal {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.75); backdrop-filter: blur(6px);
      display: flex; align-items: flex-start; justify-content: center;
      padding: 40px 20px; overflow-y: auto;
    }
    #admin-modal-body {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 20px; padding: 28px;
      width: 100%; max-width: 560px;
    }
    #admin-modal-body h3 { font-size: 18px; margin-bottom: 20px; }
    #admin-modal-body textarea.form-input { resize: vertical; font-family: inherit; }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <span class="navbar-brand">Vacantrix <span style="color:var(--text3);font-size:14px;font-weight:400">/ Панель</span></span>
  <div class="navbar-actions">
    <span id="admin-email" style="font-size:13px;color:var(--text2)"></span>
    <a href="index.html" class="btn-ghost">← Сайт</a>
    <button id="btn-admin-logout" class="btn-outline">Выйти</button>
  </div>
</nav>

<!-- Layout -->
<div class="admin-layout">

  <!-- Боковое меню -->
  <aside class="admin-sidebar">
    <div class="admin-sidebar-title">Контент</div>
    <button class="admin-nav-btn active" data-section="platforms">🗺 Площадки</button>
    <button class="admin-nav-btn" data-section="apps">📱 Приложения</button>
    <div class="admin-sidebar-title" style="margin-top:12px">Система</div>
    <button class="admin-nav-btn" data-section="users">👥 Пользователи</button>
    <button class="admin-nav-btn" data-section="settings">⚙ Настройки</button>
  </aside>

  <!-- Основная область -->
  <main class="admin-main">
    <div id="admin-content"><div class="spinner"></div></div>
  </main>
</div>

<!-- Модальное окно -->
<div id="admin-modal" class="hidden">
  <div id="admin-modal-body"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/admin.js"></script>

</body>
</html>
